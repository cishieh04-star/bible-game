<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聖經拼圖 - 羅馬書 1:16</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; background-color: #fdf6e3; margin: 0; min-height: 100vh; }
        #page-wrapper { width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; }
        #timer-container { position: fixed; top: 10px; right: 10px; z-index: 9999; }
        #timer { font-size: 16px; font-weight: bold; color: #8b4513; background: rgba(255, 255, 255, 0.9); padding: 5px 10px; border-radius: 5px; border: 1px solid #8b4513; }
        h2 { color: #8b4513; margin: 10px 0; }
        .grid-container { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin: 20px 0; align-items: center; }
        .slot { width: 32px; height: 32px; border: 2px dashed #8b4513; display: flex; align-items: center; justify-content: center; background-color: #fff; border-radius: 6px; font-weight: bold; font-size: 16px; color: #333; }
        .punctuation { font-size: 18px; font-weight: bold; color: #5d6d7e; margin: 0 2px; }
        .word { padding: 8px 12px; background-color: #8b4513; color: #ffffff; cursor: pointer; font-size: 14px; border-radius: 6px; margin: 3px; touch-action: manipulation; box-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        #reset-btn { margin-top: 20px; padding: 10px 25px; background: #ff5722; color: white; border: none; border-radius: 5px; font-size: 16px; display: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="timer-container"><div id="timer">時間: 00:00</div></div>

<div id="page-wrapper">
    <h2>羅馬書 1:16</h2>
    <div id="slots" class="grid-container"></div>
    <div id="word-pool" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
    <button id="reset-btn" onclick="location.reload()">再玩一次</button>
</div>

<script>
    const fullText = "我不以福音為恥，這福音本是神的大能，要救一切相信的，先是猶太人，後是希利尼人。（羅1：16）";
    const puncRegex = /[\-，。、（）：]/; 
    let poolData = [];
    let timerInterval, seconds = 0, timerStarted = false;

    // 自定義亂數生成器（確保每次再玩一次時，順序完全一樣）
    function seededShuffle(array, seed) {
        let m = array.length, t, i;
        while (m) {
            i = Math.floor(seed * m--);
            t = array[m]; array[m] = array[i]; array[i] = t;
        }
        return array;
    }

    function startTimer() {
        if (!timerStarted) {
            timerStarted = true;
            timerInterval = setInterval(() => {
                seconds++;
                let m = Math.floor(seconds / 60);
                let s = seconds % 60;
                document.getElementById('timer').textContent = `時間: ${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }, 1000);
        }
    }

    function renderPool() {
        const pool = document.getElementById('word-pool');
        pool.innerHTML = '';
        poolData.forEach((char, index) => {
            let div = document.createElement('div');
            div.className = 'word';
            div.textContent = char;
            div.onclick = function() {
                startTimer();
                let targetSlot = document.querySelector('.empty-slot:not([id="filled"])');
                if (targetSlot && this.textContent === targetSlot.dataset.char) {
                    targetSlot.textContent = this.textContent;
                    targetSlot.id = "filled";
                    targetSlot.style.backgroundColor = "#fff";
                    poolData.splice(index, 1); 
                    renderPool(); 
                    if (document.querySelectorAll('.empty-slot:not([id="filled"])').length === 0) finish();
                }
            };
            pool.appendChild(div);
        });
    }

    function initGame() {
        const slotsDiv = document.getElementById('slots');
        fullText.split('').forEach((char) => {
            if (puncRegex.test(char) || char === '（' || char === '）') {
                let punc = document.createElement('span');
                punc.className = 'punctuation';
                punc.textContent = char;
                slotsDiv.appendChild(punc);
            } else {
                let slot = document.createElement('div');
                slot.className = 'slot empty-slot';
                slot.dataset.char = char;
                slotsDiv.appendChild(slot);
            }
        });

        const options = fullText.split('').filter(c => !puncRegex.test(c) && c !== '（' && c !== '）');
        const blockSize = 5; 
        let blocks = [];
        for (let i = 0; i < options.length; i += blockSize) {
            let chunk = options.slice(i, i + blockSize);
            // 使用固定的 seed 進行洗牌，確保「再玩一次」順序一致
            seededShuffle(chunk, 0.123); 
            blocks.push(...chunk);
        }
        poolData = blocks;
        renderPool();
    }

    function finish() {
        clearInterval(timerInterval);
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        document.getElementById('reset-btn').style.display = 'inline-block';
        document.getElementById('word-pool').style.display = 'none';
    }

    initGame();
</script>
</body>
</html>

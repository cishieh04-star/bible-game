<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聖經拼圖 - 羅馬書 12:1</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; background-color: #fdf6e3; margin: 0; min-height: 100vh; }
        .full-width { width: 100%; max-width: 600px; text-align: center; }
        h2 { color: #8b4513; margin: 10px 0; }
        
        .action-container { margin: 15px 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .yt-link { text-decoration: none; padding: 8px 15px; background: #FF0000; color: white; border-radius: 5px; font-size: 14px; font-weight: bold; }
        .action-btn { padding: 8px 15px; background: #2e7d32; color: white; border: none; border-radius: 5px; font-size: 14px; font-weight: bold; cursor: pointer; }
        
        .grid-container { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin: 20px 0; align-items: center; }
        .slot { width: 32px; height: 32px; border: 2px dashed #8b4513; display: flex; align-items: center; justify-content: center; background-color: #fff; border-radius: 6px; font-weight: bold; font-size: 16px; color: #333; cursor: default; }
        .punctuation { font-size: 18px; font-weight: bold; color: #5d6d7e; margin: 0 2px; }
        .word { padding: 8px 12px; background-color: #8b4513; color: #ffffff; cursor: pointer; font-size: 14px; border-radius: 6px; margin: 3px; touch-action: manipulation; box-shadow: 2px 2px 4px rgba(0,0,0,0.2); transition: background-color 0.2s; }
        .hidden { visibility: hidden; }
        .instruction { color: #5d6d7e; margin-bottom: 15px; font-weight: bold; }
        #reset-btn { margin-top: 20px; padding: 10px 25px; background: #ff5722; color: white; border: none; border-radius: 5px; font-size: 16px; display: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="full-width">
    <h2>羅馬書 12:1</h2>
    
    <div class="action-container">
        <a href="https://www.youtube.com/shorts/AHRpslrdolg" target="_blank" class="yt-link">🎥 觀看複習影片</a>
        <button class="action-btn" style="background:#5c6bc0;" onclick="showPreview()">📖 觀看神的話</button>
    </div>
    
    <div class="instruction">請依順序點選正確的字填入空格，選錯不會填入喔！</div>

    <div id="slots" class="grid-container"></div>
    <div id="word-pool" style="display:flex; flex-wrap:wrap; justify-content:center; margin-top: 20px;"></div>
    
    <button id="reset-btn" onclick="location.reload()">再玩一次</button>
</div>

<script>
    const fullText = "所以弟兄們，我以神的慈悲勸你們，將身體獻上，當作活祭，是聖潔的，是神所喜悅的；你們如此事奉，乃是理所當然的。（羅12：1）";
    const puncRegex = /[，。、（）：；]/;

    // 觀看神的話功能 (10秒預覽)
    function showPreview() {
        const slots = document.querySelectorAll('.empty-slot');
        slots.forEach(slot => {
            if (slot.textContent === "") {
                slot.textContent = slot.dataset.char;
                slot.style.backgroundColor = "#e0d0b0";
            }
        });
        setTimeout(() => {
            slots.forEach(slot => {
                if (slot.dataset.char === slot.textContent) {
                    slot.textContent = "";
                    slot.style.backgroundColor = "#fff";
                }
            });
        }, 10000);
    }

    function initGame() {
        const slotsDiv = document.getElementById('slots');
        const pool = document.getElementById('word-pool');
        
        fullText.split('').forEach((char) => {
            if (puncRegex.test(char)) {
                let punc = document.createElement('span');
                punc.className = 'punctuation';
                punc.textContent = char;
                slotsDiv.appendChild(punc);
            } else {
                let slot = document.createElement('div');
                slot.className = 'slot empty-slot';
                slot.dataset.char = char;
                slotsDiv.appendChild(slot);
            }
        });

        const characters = fullText.split('').filter(c => !puncRegex.test(c));
        const shuffled = characters.sort(() => Math.random() - 0.5);

        shuffled.forEach(char => {
            let div = document.createElement('div');
            div.className = 'word';
            div.textContent = char;
            div.onclick = function() {
                let emptySlots = document.querySelectorAll('.empty-slot');
                let targetSlot = null;
                for (let s of emptySlots) {
                    if (s.textContent === "") {
                        targetSlot = s;
                        break;
                    }
                }

                if (targetSlot && this.textContent === targetSlot.dataset.char) {
                    targetSlot.textContent = this.textContent;
                    targetSlot.style.backgroundColor = "#fff"; // 確保恢復顏色
                    this.className = 'hidden';
                    
                    if (document.querySelectorAll('.empty-slot:empty').length === 0) {
                        finish();
                    }
                } else {
                    this.style.backgroundColor = "#d32f2f";
                    setTimeout(() => { this.style.backgroundColor = "#8b4513"; }, 200);
                }
            };
            pool.appendChild(div);
        });
    }

    function finish() {
        const msg = new SpeechSynthesisUtterance("太棒了");
        msg.lang = 'zh-TW';
        window.speechSynthesis.speak(msg);
        confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
        document.getElementById('reset-btn').style.display = 'inline-block';
        document.getElementById('word-pool').style.display = 'none';
    }

    initGame();
</script>
</body>
</html>

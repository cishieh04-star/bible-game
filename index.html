<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學與聖經遊戲資源中心</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; line-height: 1.6; padding: 20px; max-width: 600px; margin: auto; background-color: #f4f7f6; }
        h1 { color: #2c3e50; text-align: center; }
        ul { list-style-type: none; padding: 0; }
        li { margin: 15px 0; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        a { text-decoration: none; color: #3498db; font-weight: bold; font-size: 1.2em; display: block; }
        a:hover { color: #2980b9; }
    </style>
</head>
<body>
    <h1>互動教學程式目錄</h1>
    <p style="text-align: center;">歡迎使用教學工具，請點擊下方單元：</p>
    <ul id="game-list">
        </ul>

    <script>
        // --- 設定區 ---
        // 每次更新內容時，將此數字改大（例如 v=3），即可強制所有使用者更新快取
        const version = "2"; 
        
        const games = [
            { name: "詩篇 118:24", file: "psalm118-24.html" },
            { name: "以弗所書 4:15", file: "ephesians4-15.html" },
            { name: "加拉太書 5:1", file: "galatians5-1.html" },
            { name: "十進位練習遊戲", file: "decimal.html" },
            { name: "購物付錢模擬遊戲", file: "payment.html" },
            { name: "加法遊戲", file: "addition-game.html" },
            { name: "簡單加法練習遊戲", file: "simple-addition.html" },
            { name: "減法練習遊戲", file: "subtraction.html" },
            { name: "九九乘法遊戲", file: "timestable.html" }
        ];

        // --- 自動產生目錄邏輯 ---
        const listElement = document.getElementById('game-list');
        games.forEach(game => {
            const li = document.createElement('li');
            li.innerHTML = `<a href="${game.file}?v=${version}">${game.name}</a>`;
            listElement.appendChild(li);
        });
    </script>
</body>
</html>

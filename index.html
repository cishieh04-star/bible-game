<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動教學資源中心</title>
    <style>
        body { 
            font-family: "Helvetica Neue", Arial, sans-serif; 
            line-height: 1.6; 
            padding: 20px; 
            max-width: 500px; /* 限制寬度讓整體更集中 */
            margin: auto;     /* 強制網頁內容水平置中 */
            background-color: #f4f7f6; 
        }
        h1 { color: #2c3e50; text-align: center; }
        
        ul { 
            list-style-type: none; 
            padding: 0; 
            margin: 0 auto;  /* 確保列表容器置中 */
            text-align: center;
        }
        
        li { 
            margin: 15px 0; 
            background: white; 
            border-radius: 10px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            border: 2px solid #3498db; 
        }
        
        a { 
            text-decoration: none; 
            color: #3498db; 
            font-weight: bold; 
            font-size: 1.2em; 
            display: block; 
            padding: 20px; 
        }
        
        a:hover { background-color: #ebf5fb; color: #2980b9; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>互動教學程式目錄</h1>
    <p style="text-align: center;">歡迎使用教學工具，請點擊下方單元：</p>
    <ul id="game-list">
        </ul>

    <script>
        const version = "2"; 
        const games = [
            { name: "詩篇 118:24", file: "psalm118-24.html" },
            { name: "以弗所書 4:15", file: "ephesians4-15.html" },
            { name: "加拉太書 5:1", file: "galatians5-1.html" }
        ];

        const listElement = document.getElementById('game-list');
        games.forEach(game => {
            const li = document.createElement('li');
            li.innerHTML = `<a href="${game.file}?v=${version}">${game.name}</a>`;
            listElement.appendChild(li);
        });
    </script>
</body>
</html>

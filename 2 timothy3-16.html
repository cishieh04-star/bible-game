<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聖經拼圖 - 提摩太後書 3:16</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; background-color: #fdf6e3; margin: 0; min-height: 100vh; }
        .full-width { width: 100%; max-width: 600px; text-align: center; }
        h2 { color: #8b4513; margin: 10px 0; }
        
        .action-container { margin: 15px 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .yt-link { text-decoration: none; padding: 8px 15px; background: #FF0000; color: white; border-radius: 5px; font-size: 14px; font-weight: bold; }
        .audio-btn { padding: 8px 15px; background: #2e7d32; color: white; border: none; border-radius: 5px; font-size: 14px; font-weight: bold; cursor: pointer; }
        
        .grid-container { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin: 20px 0; align-items: center; }
        .slot { width: 32px; height: 32px; border: 2px dashed #8b4513; display: flex; align-items: center; justify-content: center; background-color: #fff; border-radius: 6px; font-weight: bold; font-size: 16px; color: #333; }
        .punctuation { font-size: 18px; font-weight: bold; color: #5d6d7e; margin: 0 2px; }
        .word { padding: 8px 12px; background-color: #8b4513; color: #ffffff; cursor: pointer; font-size: 14px; border-radius: 6px; margin: 3px; touch-action: manipulation; box-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .hidden { visibility: hidden; }
        .instruction { color: #5d6d7e; margin-bottom: 15px; font-weight: bold; }
        #reset-btn { margin-top: 20px; padding: 10px 25px; background: #ff5722; color: white; border: none; border-radius: 5px; font-size: 16px; display: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="full-width">
    <h2>提摩太後書 3:16</h2>
    
    <div class="action-container">
        <a href="https://www.youtube.com/shorts/xBLKrx7It2w" target="_blank" class="yt-link">🎥 觀看複習影片</a>
        <button class="audio-btn" onclick="playAudio()">🔊 聆聽神的話</button>
    </div>
    
    <!-- 
      注意這行！
      請確認 GitHub 上的資料夾是 audio-bible，檔名是 2_timothy3-16.mp3（全小寫）
      如果您的資料夾是 audio-bible，請將 src 改為 "audio-bible/2_timothy3-16.mp3"
    -->
    <audio id="bible-audio" src="audio/2_timothy3-16.mp3" preload="auto" onerror="handleAudioError()"></audio>

    <div class="instruction">請點選下面的字，正確的字會自動進入格中</div>

    <div id="slots" class="grid-container"></div>
    <div id="word-pool" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
    
    <button id="reset-btn" onclick="location.reload()">再玩一次</button>
</div>

<script>
    const fullText = "聖經都是神所默示的，於教訓、督責、使人歸正、教導人學義都是有益的。（提後3:16）";
    const puncRegex = /[，、。（）：]/;

    // 音訊載入失敗時的強制提醒
    function handleAudioError() {
        alert("找不到聲音檔案！\n請檢查 GitHub 上是否真的有這個路徑：\naudio/2_timothy3-16.mp3\n(請注意 .mp3 必須是小寫，不能是 .MP3)");
    }

    // 播放函式
    function playAudio() {
        const audio = document.getElementById('audio-bible');
        
        // 檢查音訊網址是否為空
        if (!audio.getAttribute('src')) {
            alert("尚未設定音訊網址！");
            return;
        }

        if (!audio.paused) {
            audio.pause();
            audio.currentTime = 0;
        }
        
        // 捕捉播放錯誤並彈出視窗
        let playPromise = audio.play();
        if (playPromise !== undefined) {
            playPromise.then(_ => {
                // 自動播放成功
            }).catch(error => {
                alert("播放被阻擋或發生錯誤！\n錯誤原因: " + error.message);
            });
        }
    }

    // 遊戲初始化
    function initGame() {
        const slotsDiv = document.getElementById('slots');
        const pool = document.getElementById('word-pool');
        
        fullText.split('').forEach((char) => {
            if (puncRegex.test(char)) {
                let punc = document.createElement('span');
                punc.className = 'punctuation';
                punc.textContent = char;
                slotsDiv.appendChild(punc);
            } else {
                let slot = document.createElement('div');
                slot.className = 'slot empty-slot';
                slot.dataset.char = char;
                slotsDiv.appendChild(slot);
            }
        });

        const options = fullText.split('').filter(c => !puncRegex.test(c));
        options.sort(() => Math.random() - 0.5).forEach(char => {
            let div = document.createElement('div');
            div.className = 'word';
            div.textContent = char;
            div.onclick = function() {
                let targetSlot = document.querySelector('.empty-slot:not([id="filled"])');
                if (targetSlot && this.textContent === targetSlot.dataset.char) {
                    targetSlot.textContent = this.textContent;
                    targetSlot.id = "filled";
                    this.className = 'hidden';
                    if (document.querySelectorAll('.empty-slot:not([id="filled"])').length === 0) finish();
                }
            };
            pool.appendChild(div);
        });
    }

    // 遊戲完成
    function finish() {
        const msg = new SpeechSynthesisUtterance("太棒了");
        msg.lang = 'zh-TW';
        window.speechSynthesis.speak(msg);
        confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
        document.getElementById('reset-btn').style.display = 'inline-block';
        document.getElementById('word-pool').style.display = 'none';
    }

    initGame();
</script>
</body>
</html>

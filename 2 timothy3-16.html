<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數學題目練習</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #fdf6e3; margin: 0; min-height: 100vh; }
        
        #startScreen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: #fdf6e3; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .start-btn { padding: 25px 50px; font-size: 24px; background: #ff69b4; color: white; border-radius: 20px; cursor: pointer; border: none; box-shadow: 0 6px #c71585; }
        .hint-text { font-size: 14px; color: #666; margin-top: 20px; text-align: center; }

        .container { width: 100%; max-width: 600px; text-align: center; }
        .char-wrapper { display: inline-flex; align-items: center; justify-content: center; margin: 4px; padding: 5px; background: white; border: 2px solid #8b4513; border-radius: 8px; cursor: pointer; width: 70px; height: 70px; flex-shrink: 0; }
        .char { font-size: 24px; font-weight: bold; margin-right: 2px; }
        .zhuyin-col { display: flex; flex-direction: column; font-size: 11px; color: #d35400; line-height: 1.1; width: 16px; }
        
        .slots-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin: 20px 0; min-height: 70px; }
        .slot { width: 50px; height: 70px; border: 2px dashed #8b4513; background: #fff; border-radius: 8px; flex-shrink: 0; }
        
        .word-pool { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-top: 20px; }
        .audio-btn { padding: 15px 30px; font-size: 20px; background: #ff69b4; color: white; border: none; border-radius: 12px; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="startScreen">
    <button class="start-btn" onclick="initGame()">▶ 開始遊戲</button>
    <p class="hint-text">若聽不到聲音，請點右上角選單<br>選擇「以瀏覽器開啟」</p>
</div>

<div class="container">
    <h2>數學題目練習</h2>
    <button class="audio-btn" onclick="triggerSpeak()">🔊 聽題目</button>
    <div id="slots" class="slots-container"></div>
    <div id="word-pool" class="word-pool"></div>
</div>

<script>
    // GitHub 存放 MP3 的基礎路徑
    const AUDIO_BASE_URL = "https://cishieh04-star.github.io/audio-bible/";

    const levels = [
        { 
            text: "有幾個已經跳出去了？", 
            audio: "2_timothy3-16.mp3", // 請確保此檔案已上傳至 GitHub
            data: [{c:"有",z:"ㄧㄡˇ"},{c:"幾",z:"ㄐㄧˇ"},{c:"個",z:"˙ㄍㄜ"},{c:"已",z:"ㄧˇ"},{c:"經",z:"ㄐㄧㄥ"},{c:"跳",z:"ㄊㄧㄠˋ"},{c:"出",z:"ㄔㄨ"},{c:"去",z:"ㄑㄩˋ"},{c:"了",z:"˙ㄌㄜ"},{c:"？",z:""}] 
        },
        { 
            text: "還剩下幾隻鳥？", 
            audio: "2_timothy3-16.mp3", // 請替換成對應的鳥叫聲或題目檔名
            data: [{c:"還",z:"ㄏㄞˊ"},{c:"剩",z:"ㄕㄥˋ"},{c:"下",z:"ㄒㄧㄚˋ"},{c:"幾",z:"ㄐㄧˇ"},{c:"隻",z:"ㄓ"},{c:"鳥",z:"ㄋㄧㄠˇ"},{c:"？",z:""}] 
        }
    ];

    let currentLevel = 0;

    // 使用 Audio 物件播放錄音檔，取代 TTS 引擎
    function playAudio(filename) {
        const audio = new Audio(AUDIO_BASE_URL + filename);
        audio.play().catch(e => console.log("等待互動後播放"));
    }

    function initGame() {
        document.getElementById('startScreen').style.display = 'none';
        loadLevel();
    }

    function triggerSpeak() { 
        playAudio(levels[currentLevel].audio); 
    }

    function loadLevel() {
        const slotsDiv = document.getElementById('slots');
        const poolDiv = document.getElementById('word-pool');
        slotsDiv.innerHTML = '';
        poolDiv.innerHTML = '';
        
        levels[currentLevel].data.forEach(item => {
            let slot = document.createElement('div');
            slot.className = 'slot';
            slot.dataset.char = item.c;
            slotsDiv.appendChild(slot);
        });

        [...levels[currentLevel].data].sort(() => Math.random() - 0.5).forEach(item => {
            let div = document.createElement('div');
            div.className = 'char-wrapper';
            div.dataset.char = item.c; 
            let zhuyinHTML = item.z.split('').map(char => `<span>${char}</span>`).join('');
            div.innerHTML = `<div class="char">${item.c}</div><div class="zhuyin-col">${zhuyinHTML}</div>`;
            poolDiv.appendChild(div);
        });
        
        setTimeout(triggerSpeak, 500);
    }

    // 事件委託，確保三星手機點擊不失效
    document.addEventListener('click', function(e) {
        const target = e.target.closest('.char-wrapper');
        if (!target) return;

        const char = target.dataset.char;
        let emptySlot = Array.from(document.querySelectorAll('.slot')).find(s => !s.innerHTML);
        
        if (emptySlot && char === emptySlot.dataset.char) {
            emptySlot.innerHTML = target.innerHTML;
            target.style.visibility = 'hidden';
            
            if (!document.querySelector('.slot:empty')) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                // 答對時的音效（可選）
                setTimeout(() => { 
                    currentLevel = (currentLevel + 1) % levels.length; 
                    loadLevel(); 
                }, 2000);
            }
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聖經拼圖 - 加拉太書 2:20</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; background-color: #f0f7ff; margin: 0; min-height: 100vh; }
        h2 { color: #003366; margin: 10px 0; }
        .grid-container { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 10px; max-width: 95%; }
        .slot { width: 45px; height: 45px; border: 2px dashed #00509e; display: flex; align-items: center; justify-content: center; background-color: #e3f2fd; border-radius: 6px; font-weight: bold; }
        .fixed { border: none; background: transparent; font-size: 20px; font-weight: bold; color: #00509e; }
        .word { padding: 0 10px; height: 40px; background-color: #003366; color: #ffffff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; font-weight: bold; border-radius: 6px; margin: 4px; touch-action: manipulation; box-shadow: 2px 2px 5px rgba(0,0,0,0.2); }
        .hidden { visibility: hidden; }
        #word-pool { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-top: 20px; max-width: 95%; }
        #reset-btn { margin-top: 20px; padding: 10px 20px; background: #ff5722; color: white; border: none; border-radius: 5px; font-size: 16px; display: none; cursor: pointer; }
        .instruction { color: #555; font-size: 14px; margin-bottom: 15px; font-weight: bold; }
        .yt-link { text-decoration: none; padding: 10px 20px; background: #FF0000; color: white; border-radius: 5px; font-size: 16px; display: inline-block; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>加拉太書 2:20</h2>
    <a href="https://www.youtube.com/shorts/hdZ31pPcnfM" target="_blank" class="yt-link">🎥 觀看複習影片</a>
    <div class="instruction">請點選正確的字，無須拉動</div>

    <div id="slots" class="grid-container"></div>
    <div id="word-pool"></div>
    <button id="reset-btn" onclick="location.reload()">再玩一次</button>

    <script>
        const fullText = "我已經與基督同釘十字架，現在活著的不再是我，乃是基督在我裡面活著。（加2：20）";
        const puncRegex = /[，。（）：]/;
        let currentSlotIndex = 0;

        const slotsDiv = document.getElementById('slots');
        const pool = document.getElementById('word-pool');

        // 建立格子
        fullText.split('').forEach((char) => {
            let slot = document.createElement('div');
            slot.className = 'slot';
            if (puncRegex.test(char)) {
                slot.textContent = char;
                slot.classList.add('fixed');
            } else {
                slot.dataset.answer = char;
            }
            slotsDiv.appendChild(slot);
        });

        const allSlots = document.querySelectorAll('.slot:not(.fixed)');
        const shuffled = fullText.split('').filter(c => !puncRegex.test(c)).sort(() => Math.random() - 0.5);
        
        shuffled.forEach((w) => {
            let div = document.createElement('div');
            div.className = 'word';
            div.textContent = w;
            div.onclick = function() {
                if (currentSlotIndex < allSlots.length && this.textContent === allSlots[currentSlotIndex].dataset.answer) {
                    allSlots[currentSlotIndex].textContent = this.textContent;
                    this.className = 'hidden';
                    currentSlotIndex++;
                    if (currentSlotIndex === allSlots.length) finish();
                }
            };
            pool.appendChild(div);
        });

        function finish() {
            const msg = new SpeechSynthesisUtterance("太棒了");
            msg.lang = 'zh-TW';
            window.speechSynthesis.speak(msg);
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
            document.getElementById('reset-btn').style.display = 'block';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聖經拼圖 - 腓立比書 4:6-7</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; background-color: #fdf6e3; margin: 0; min-height: 100vh; position: relative; }
        .full-width { width: 100%; max-width: 600px; text-align: center; margin-top: 50px; }
        #timer { position: fixed; top: 10px; right: 10px; font-size: 16px; font-weight: bold; color: #8b4513; background: rgba(255, 255, 255, 0.8); padding: 5px 10px; border-radius: 5px; z-index: 1000; border: 1px solid #8b4513; }
        h2 { color: #8b4513; margin: 10px 0; }
        .action-container { margin: 15px 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .yt-link { text-decoration: none; padding: 8px 15px; background: #FF0000; color: white; border-radius: 5px; font-size: 14px; font-weight: bold; }
        .preview-btn { padding: 8px 15px; background: #5c6bc0; color: white; border: none; border-radius: 5px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .grid-container { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin: 20px 0; align-items: center; }
        .slot { width: 32px; height: 32px; border: 2px dashed #8b4513; display: flex; align-items: center; justify-content: center; background-color: #fff; border-radius: 6px; font-weight: bold; font-size: 16px; color: #333; }
        .punctuation { font-size: 18px; font-weight: bold; color: #5d6d7e; margin: 0 2px; }
        .word { padding: 8px 12px; background-color: #8b4513; color: #ffffff; cursor: pointer; font-size: 14px; border-radius: 6px; margin: 3px; touch-action: manipulation; box-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .instruction { color: #5d6d7e; margin-bottom: 15px; font-weight: bold; }
        .control-btns { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
        .btn-action { padding: 10px 20px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; }
        #undo-btn { background: #f39c12; color: white; }
        #reset-btn { background: #ff5722; color: white; display: none; }
    </style>
</head>
<body>

<div id="timer">時間: 00:00</div>

<div class="full-width">
    <h2>腓立比書 4:6-7</h2>
    <div class="action-container">
        <a href="https://www.youtube.com/shorts/q5pj78ZduAQ" target="_blank" class="yt-link">🎥 觀看複習影片</a>
        <button class="preview-btn" onclick="showPreview()">📖 觀看神的話</button>
    </div>
    <div class="instruction">請點選下方的字，填入空格中 (每 5 字為一區段)</div>
    <div id="slots" class="grid-container"></div>
    <div id="word-pool" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
    
    <div class="control-btns">
        <button id="undo-btn" class="btn-action" onclick="undoLast()">⟲ 更正</button>
        <button id="reset-btn" class="btn-action" onclick="location.reload()">再玩一次</button>
    </div>
</div>

<script>
    const fullText = "應當一無掛慮，只要凡事藉著禱告、祈求，和感謝，將你們所要的告訴神。神所賜、出人意外的平安必在基督耶穌裡保守你們的心懷意念。（腓4：6-7）";
    const puncRegex = /[\-，。、（）：]/; 
    let poolData = [];
    let blocks = []; // 儲存區段資料
    let timerInterval, seconds = 0, timerStarted = false;

    function startTimer() {
        if (!timerStarted) {
            timerStarted = true;
            timerInterval = setInterval(() => {
                seconds++;
                let m = Math.floor(seconds / 60);
                let s = seconds % 60;
                document.getElementById('timer').textContent = `時間: ${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }, 1000);
        }
    }

    function undoLast() {
        const filled = document.querySelectorAll('.slot[id="filled"]');
        if (filled.length > 0) {
            const lastSlot = filled[filled.length - 1];
            poolData.push(lastSlot.dataset.char);
            lastSlot.textContent = "";
            lastSlot.removeAttribute('id');
            lastSlot.style.backgroundColor = "#fff";
            renderPool();
        }
    }

    function showPreview() {
        const slots = document.querySelectorAll('.empty-slot');
        slots.forEach(slot => {
            if (slot.id !== "filled") {
                slot.textContent = slot.dataset.char;
                slot.style.backgroundColor = "#e0d0b0";
            }
        });
        setTimeout(() => {
            slots.forEach(slot => {
                if (slot.id !== "filled") {
                    slot.textContent = "";
                    slot.style.backgroundColor = "#fff";
                }
            });
        }, 2000);
    }

    function renderPool() {
        const pool = document.getElementById('word-pool');
        pool.innerHTML = '';
        // 渲染時直接使用目前 poolData 的順序，確保邏輯一致[cite: 1]
        poolData.forEach((char, index) => {
            let div = document.createElement('div');
            div.className = 'word';
            div.textContent = char;
            div.onclick = function() {
                startTimer();
                let targetSlot = document.querySelector('.empty-slot:not([id="filled"])');
                if (targetSlot && this.textContent === targetSlot.dataset.char) {
                    targetSlot.textContent = this.textContent;
                    targetSlot.id = "filled";
                    targetSlot.style.backgroundColor = "#fff";
                    poolData.splice(index, 1); 
                    renderPool(); 
                    if (document.querySelectorAll('.empty-slot:not([id="filled"])').length === 0) finish();
                }
            };
            pool.appendChild(div);
        });
    }

    function initGame() {
        const slotsDiv = document.getElementById('slots');
        fullText.split('').forEach((char) => {
            if (puncRegex.test(char) || char === '（' || char === '）') {
                let punc = document.createElement('span');
                punc.className = 'punctuation';
                punc.textContent = char;
                slotsDiv.appendChild(punc);
            } else {
                let slot = document.createElement('div');
                slot.className = 'slot empty-slot';
                slot.dataset.char = char;
                slotsDiv.appendChild(slot);
            }
        });

        const options = fullText.split('').filter(c => !puncRegex.test(c) && c !== '（' && c !== '）');
        const blockSize = 5; 
        
        // 建立區段並在區段內亂數[cite: 1]
        for (let i = 0; i < options.length; i += blockSize) {
            let chunk = options.slice(i, i + blockSize);
            chunk.sort(() => Math.random() - 0.5); // 區塊內亂數[cite: 1]
            blocks.push(...chunk);
        }
        poolData = blocks;
        renderPool();
    }

    function finish() {
        clearInterval(timerInterval);
        const msg = new SpeechSynthesisUtterance("太棒了");
        msg.lang = 'zh-TW';
        window.speechSynthesis.speak(msg);
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        document.getElementById('reset-btn').style.display = 'inline-block';
        document.getElementById('undo-btn').style.display = 'none';
        document.getElementById('word-pool').style.display = 'none';
    }

    initGame();
</script>
</body>
</html>

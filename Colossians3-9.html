<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>歌羅西書 3:9 互動遊戲</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; background-color: #fdf6e3; margin: 0; min-height: 100vh; }
        .full-width { width: 100%; max-width: 600px; text-align: center; }
        h2 { color: #8b4513; margin: 10px 0; }
        .grid-container { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 20px 0; }
        .slot { width: 35px; height: 35px; border: 2px dashed #8b4513; display: flex; align-items: center; justify-content: center; background-color: #fff; border-radius: 6px; font-weight: bold; font-size: 18px; color: #333; }
        .fixed { border: none; background: transparent; }
        .word { padding: 10px 15px; background-color: #8b4513; color: #ffffff; cursor: pointer; font-size: 16px; border-radius: 6px; margin: 4px; touch-action: manipulation; box-shadow: 2px 2px 5px rgba(0,0,0,0.2); }
        .hidden { visibility: hidden; }
        .yt-link { text-decoration: none; padding: 8px 15px; background: #FF0000; color: white; border-radius: 5px; font-size: 14px; margin-bottom: 15px; font-weight: bold; display: inline-block; }
        .instruction { color: #5d6d7e; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="full-width">
    <h2>歌羅西書 3:9</h2>
    <a href="https://www.youtube.com/shorts/eWoYo1XKwD4" target="_blank" class="yt-link">🎥 觀看複習影片</a>
    <div class="instruction">請點選下面的字，填入空格中</div>

    <div id="slots" class="grid-container"></div>
    <div id="word-pool" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
</div>

<script>
    const verse = "不要彼此說謊，因你們已經脫去舊人，和舊人的行為。";

    function initGame() {
        const slotsDiv = document.getElementById('slots');
        const pool = document.getElementById('word-pool');
        
        // 建立格子
        verse.split('').forEach((char) => {
            let slot = document.createElement('div');
            slot.className = 'slot';
            if (char === '，' || char === '。') {
                slot.textContent = char;
                slot.classList.add('fixed');
            } else {
                slot.classList.add('empty-slot');
                slot.dataset.char = char;
            }
            slotsDiv.appendChild(slot);
        });

        // 建立文字庫
        const options = verse.split('').filter(c => c !== '，' && c !== '。');
        options.sort(() => Math.random() - 0.5).forEach(char => {
            let div = document.createElement('div');
            div.className = 'word';
            div.textContent = char;
            div.onclick = function() {
                let targetSlot = document.querySelector('.empty-slot:not([id="filled"])');
                if (targetSlot && this.textContent === targetSlot.dataset.char) {
                    targetSlot.textContent = this.textContent;
                    targetSlot.id = "filled";
                    this.className = 'hidden';
                    if (document.querySelectorAll('.empty-slot:not([id="filled"])').length === 0) finish();
                }
            };
            pool.appendChild(div);
        });
    }

    function finish() {
        confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
    }

    initGame();
</script>
</body>
</html>

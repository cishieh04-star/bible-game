<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聖經記憶遊戲 - 詩篇 23 篇</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; background-color: #fdf6e3; margin: 0; min-height: 100vh; }
        #timer { position: fixed; top: 15px; right: 15px; background: #8b4513; color: white; padding: 8px 12px; border-radius: 6px; font-weight: bold; z-index: 9999; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .full-width { width: 100%; max-width: 600px; text-align: center; margin-top: 40px; }
        h2 { color: #8b4513; margin: 10px 0; }
        .theme { color: #d84315; font-weight: bold; font-size: 1.1em; margin-bottom: 10px; }
        .action-container { margin: 15px 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .yt-link { text-decoration: none; padding: 8px 15px; background: #FF0000; color: white; border-radius: 5px; font-size: 14px; font-weight: bold; }
        .action-btn { padding: 8px 15px; background: #5c6bc0; color: white; border: none; border-radius: 5px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .grid-container { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin: 20px 0; align-items: center; }
        .slot { width: 32px; height: 32px; border: 2px dashed #8b4513; display: flex; align-items: center; justify-content: center; background-color: #fff; border-radius: 6px; font-weight: bold; font-size: 16px; color: #333; transition: background-color 0.3s; }
        .slot.locked { background-color: #fff !important; }
        .punctuation { font-size: 18px; font-weight: bold; color: #5d6d7e; margin: 0 2px; }
        .word { padding: 8px 12px; background-color: #8b4513; color: #ffffff; cursor: pointer; font-size: 14px; border-radius: 6px; margin: 3px; touch-action: manipulation; box-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .hidden { visibility: hidden; }
        .feedback { margin-top: 20px; display: none; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .next-btn { background: #2e7d32; color: white; }
        .reset-btn { background: #ff5722; color: white; }
    </style>
</head>
<body>

<div id="timer">時間: 00:00</div>

<div class="full-width">
    <h2 id="stage-title">詩篇 23 篇 - 第一段</h2>
    <div id="theme-display" class="theme"></div>
    
    <div class="action-container">
        <a href="https://www.youtube.com/shorts/UKPnCJ3TQPc" target="_blank" class="yt-link">🎥 觀看複習影片</a>
        <button class="action-btn" onclick="showPreview()">📖 觀看神的話</button>
    </div>
    
    <div id="slots" class="grid-container"></div>
    <div id="word-pool" style="display:flex; flex-wrap:wrap; justify-content:center; margin-top: 20px;"></div>
    
    <div id="feedback" class="feedback">
        <button id="next-stage-btn" class="btn next-btn" onclick="nextStage()">進入下一段</button>
        <button class="btn reset-btn" onclick="resetCurrentStage()">再玩一次</button>
    </div>
</div>

<script>
    const psalmData = [
        { text: "耶和華是我的牧者，我必不致缺乏。祂使我躺臥在青草地上，領我在可安歇的水邊。", theme: "牧者的供應" },
        { text: "祂使我的靈魂甦醒，為自己的名引導我走義路。我雖然行過死蔭的幽谷，也不怕遭害，因為祢與我同在；祢的杖，祢的竿，都安慰我。", theme: "牧者的引領" },
        { text: "在我敵人面前，祢為我擺設筵席；祢用油膏了我的頭，使我的福杯滿溢。我一生一世必有恩惠慈愛隨著我；我且要住在耶和華的殿中，直到永遠。", theme: "牧者的豐盛" }
    ];

    let currentStage = 0, seconds = 0, timerStarted = false, timerInterval;
    const puncRegex = /[，。、（）：；]/;

    function resetTimer() { clearInterval(timerInterval); seconds = 0; timerStarted = false; document.getElementById("timer").innerText = "時間: 00:00"; }
    function startTimer() { if (!timerStarted) { timerStarted = true; timerInterval = setInterval(() => { seconds++; document.getElementById("timer").innerText = `時間: ${String(Math.floor(seconds/60)).padStart(2,'0')}:${String(seconds%60).padStart(2,'0')}`; }, 1000); } }

    function showPreview() {
        const slots = document.querySelectorAll('.empty-slot');
        slots.forEach(s => { 
            // 若格子尚未鎖定，才執行預覽變色
            if (!s.classList.contains('locked')) {
                s.textContent = s.dataset.char; 
                s.style.backgroundColor = "#e0d0b0"; 
                setTimeout(() => { 
                    if(!s.classList.contains('locked')) { s.textContent = ""; s.style.backgroundColor = "#fff"; } 
                }, 3000);
            }
        });
    }

    function renderStage() {
        resetTimer();
        const slotsDiv = document.getElementById('slots'), pool = document.getElementById('word-pool');
        slotsDiv.innerHTML = ''; pool.innerHTML = ''; document.getElementById('feedback').style.display = 'none';
        document.getElementById('stage-title').innerText = `詩篇 23 篇 - 第 ${currentStage + 1} 段`;
        document.getElementById('theme-display').innerText = psalmData[currentStage].theme;

        const text = psalmData[currentStage].text, chars = text.split('');
        chars.forEach(char => {
            if (puncRegex.test(char)) { let p = document.createElement('span'); p.className = 'punctuation'; p.textContent = char; slotsDiv.appendChild(p); }
            else { let s = document.createElement('div'); s.className = 'slot empty-slot'; s.dataset.char = char; slotsDiv.appendChild(s); }
        });

        const allChars = chars.filter(c => !puncRegex.test(c));
        let poolChars = [];
        for (let i = 0; i < allChars.length; i += 5) {
            let chunk = allChars.slice(i, i + 5).sort(() => Math.random() - 0.5);
            poolChars.push(...chunk);
        }

        poolChars.forEach(char => {
            let div = document.createElement('div'); div.className = 'word'; div.textContent = char;
            div.onclick = function() {
                startTimer();
                let empty = Array.from(document.querySelectorAll('.empty-slot')).find(s => s.textContent === "");
                if (empty && this.textContent === empty.dataset.char) {
                    empty.textContent = this.textContent; empty.classList.add('locked'); this.className = 'hidden';
                    if (!document.querySelector('.empty-slot:empty')) {
                        clearInterval(timerInterval);
                        const msg = new SpeechSynthesisUtterance("太棒了"); msg.lang = 'zh-TW'; window.speechSynthesis.speak(msg);
                        confetti({ particleCount: 150, spread: 80 });
                        document.getElementById('feedback').style.display = 'flex';
                        if(currentStage === 2) document.getElementById('next-stage-btn').style.display = 'none';
                    }
                } else { this.style.backgroundColor = "#d32f2f"; setTimeout(() => this.style.backgroundColor = "#8b4513", 200); }
            };
            pool.appendChild(div);
        });
    }

    function resetCurrentStage() { renderStage(); }
    function nextStage() { currentStage++; if (currentStage < psalmData.length) renderStage(); }

    renderStage();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>天國八福互動遊戲</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; background-color: #fdf6e3; margin: 0; min-height: 100vh; }
        .full-width { width: 100%; max-width: 600px; text-align: center; }
        h2 { color: #8b4513; margin: 10px 0; }
        .grid-container { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 20px 0; }
        .slot { width: 35px; height: 35px; border: 2px dashed #8b4513; display: flex; align-items: center; justify-content: center; background-color: #fff; border-radius: 6px; font-weight: bold; font-size: 18px; color: #333; }
        .fixed { border: none; background: transparent; }
        .word { padding: 8px 12px; background-color: #8b4513; color: #ffffff; cursor: pointer; font-size: 16px; border-radius: 6px; margin: 4px; touch-action: manipulation; box-shadow: 2px 2px 5px rgba(0,0,0,0.2); }
        .hidden { visibility: hidden; }
        .nav-btn { margin-top: 20px; padding: 12px 30px; background: #2e7d32; color: white; border: none; border-radius: 5px; font-size: 18px; display: none; cursor: pointer; }
        .yt-link { text-decoration: none; padding: 8px 15px; background: #FF0000; color: white; border-radius: 5px; font-size: 14px; margin-bottom: 15px; font-weight: bold; display: inline-block; }
        .result-item { text-align: left; background: white; padding: 10px; margin: 5px 0; border-radius: 5px; border-left: 5px solid #8b4513; }
    </style>
</head>
<body>

<div class="full-width">
    <h2 id="level-title">第一福</h2>
    <a href="https://youtu.be/V_Ce-oaddIU?si=CJzn8rpaMa1v9Uc_" target="_blank" class="yt-link">🎥 點擊觀看八福影片</a>
    
    <div id="game-area">
        <div id="slots" class="grid-container"></div>
        <div id="word-pool" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
        <button id="next-btn" class="nav-btn" onclick="nextLevel()">下一福</button>
    </div>
    <div id="final-summary" style="display:none;">
        <h2>天國八福總覽</h2>
        <div id="summary-list"></div>
    </div>
</div>

<script>
    const levels = [
        { verse: "虛心的人有福了，因為天國是他們的。", title: "第一福" },
        { verse: "哀慟的人有福了，因為他們必得安慰。", title: "第二福" },
        { verse: "溫柔的人有福了，因為他們必承受地土。", title: "第三福", readAs: "溫柔的人有福了，因為他們必承受，地，土。" },
        { verse: "飢渴慕義的人有福了，因為他們必得飽足。", title: "第四福" },
        { verse: "憐憫人的人有福了，因為他們必蒙憐憫。", title: "第五福" },
        { verse: "清心的人有福了，因為他們必得見神。", title: "第六福" },
        { verse: "使人和睦的人有福了，因為他們必稱為神的兒子。", title: "第七福", readAs: "使人和睦的人有福了，因為他們必稱為，神的，兒子。" },
        { verse: "為義受逼迫的人有福了，因為天國是他們的。", title: "第八福" }
    ];

    let currentLevel = 0;

    function speak(data) {
        window.speechSynthesis.cancel();
        setTimeout(() => {
            let textToRead = (data.readAs || data.verse).replace(/，|。/g, "，");
            const msg = new SpeechSynthesisUtterance(textToRead);
            msg.lang = 'zh-TW';
            msg.rate = 0.4;
            window.speechSynthesis.speak(msg);
        }, 1000);
    }

    function loadLevel() {
        const data = levels[currentLevel];
        document.getElementById('level-title').textContent = data.title;
        const slotsDiv = document.getElementById('slots');
        const pool = document.getElementById('word-pool');
        slotsDiv.innerHTML = '';
        pool.innerHTML = '';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('word-pool').style.display = 'flex';

        // 1. 產生格子 (包含標點)
        data.verse.split('').forEach((char) => {
            let slot = document.createElement('div');
            slot.className = 'slot';
            if (char === '，' || char === '。') {
                slot.textContent = char;
                slot.classList.add('fixed');
            } else {
                slot.classList.add('empty-slot');
                slot.dataset.char = char;
            }
            slotsDiv.appendChild(slot);
        });

        // 2. 產生選項 (僅限國字)
        const options = data.verse.split('').filter(c => c !== '，' && c !== '。');
        options.sort(() => Math.random() - 0.5).forEach(char => {
            let div = document.createElement('div');
            div.className = 'word';
            div.textContent = char;
            div.onclick = function() {
                let targetSlot = document.querySelector('.empty-slot:not([id="filled"])');
                if (targetSlot && this.textContent === targetSlot.dataset.char) {
                    targetSlot.textContent = this.textContent;
                    targetSlot.id = "filled";
                    this.className = 'hidden';
                    if (document.querySelectorAll('.empty-slot:not([id="filled"])').length === 0) finish();
                } else if (targetSlot) { alert("選錯囉！"); }
            };
            pool.appendChild(div);
        });
        speak(data);
    }

    function finish() {
        confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
        document.getElementById('word-pool').style.display = 'none';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextLevel() {
        currentLevel++;
        if (currentLevel < levels.length) loadLevel();
        else showSummary();
    }

    function showSummary() {
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('final-summary').style.display = 'block';
        const list = document.getElementById('summary-list');
        levels.forEach(l => list.innerHTML += `<div class="result-item"><strong>${l.title}：</strong>${l.verse}</div>`);
    }

    loadLevel();
</script>
</body>
</html>

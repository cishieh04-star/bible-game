<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聖經拼圖 - 馬可福音 16:20</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; background-color: #fdf6e3; margin: 0; min-height: 100vh; }
        .full-width { width: 100%; max-width: 600px; text-align: center; }
        h2 { color: #8b4513; margin: 10px 0 5px 0; }
        
        /* 影片容器修正：固定 16:9 比例並限制寬度 */
        .video-container { position: relative; width: 100%; max-width: 320px; padding-bottom: 56.25%; height: 0; margin: 15px auto; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        .game-row { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin: 20px 0; align-items: center; }
        .slot { width: 35px; height: 35px; border: 2px dashed #8b4513; display: flex; align-items: center; justify-content: center; background-color: #fff; border-radius: 6px; font-weight: bold; font-size: 18px; color: #333; }
        .punctuation { font-size: 20px; font-weight: bold; color: #5d6d7e; margin: 0 2px; }
        .word { padding: 10px 15px; background-color: #8b4513; color: #ffffff; cursor: pointer; font-size: 16px; border-radius: 6px; margin: 4px; touch-action: manipulation; box-shadow: 2px 2px 5px rgba(0,0,0,0.2); }
        .hidden { visibility: hidden; }
        #reset-btn { margin-top: 20px; padding: 12px 30px; background: #2e7d32; color: white; border: none; border-radius: 5px; font-size: 18px; display: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="full-width">
    <h2>拼圖遊戲</h2>
    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/BWUGLmNOcRo" allowfullscreen></iframe>
    </div>
    
    <div id="game-area" class="game-row"></div>
    <div id="word-pool" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
    <button id="reset-btn" onclick="location.reload()">再玩一次</button>
</div>

<script>
    const fullText = "門徒出去，到處宣傳福音。主和他們同工，用神蹟隨著，證實所傳的道。阿們！馬可福音16:20";
    const puncRegex = /[，。！：]/;
    
    function playSuccessSound() {
        const msg = new SpeechSynthesisUtterance("太棒了");
        msg.lang = 'zh-TW';
        const voices = window.speechSynthesis.getVoices();
        msg.voice = voices.find(v => v.name.includes("Female") || v.name.includes("Google 國語")) || voices[0];
        window.speechSynthesis.speak(msg);
    }

    function initGame() {
        const gameArea = document.getElementById('game-area');
        const pool = document.getElementById('word-pool');
        
        fullText.split('').forEach((char) => {
            if (puncRegex.test(char)) {
                let punc = document.createElement('span');
                punc.className = 'punctuation';
                punc.textContent = char;
                gameArea.appendChild(punc);
            } else {
                let slot = document.createElement('div');
                slot.className = 'slot empty-slot';
                slot.dataset.char = char;
                gameArea.appendChild(slot);
            }
        });

        const options = fullText.split('').filter(c => !puncRegex.test(c));
        options.sort(() => Math.random() - 0.5).forEach(char => {
            let div = document.createElement('div');
            div.className = 'word';
            div.textContent = char;
            div.onclick = function() {
                let targetSlot = document.querySelector('.empty-slot:not([id="filled"])');
                if (targetSlot && this.textContent === targetSlot.dataset.char) {
                    targetSlot.textContent = this.textContent;
                    targetSlot.id = "filled";
                    this.className = 'hidden';
                    if (document.querySelectorAll('.empty-slot:not([id="filled"])').length === 0) finish();
                }
            };
            pool.appendChild(div);
        });
    }

    function finish() {
        playSuccessSound();
        confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
        document.getElementById('reset-btn').style.display = 'inline-block';
        document.getElementById('word-pool').style.display = 'none';
    }

    initGame();
</script>
</body>
</html>
